name: PIF Professional Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install adm-zip

      - name: Run Processor
        env:
          GH_TOKEN: ${{ github.token }}
        run: node process_pif.js

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LATEST=$(ls -t pif_library/*.json 2>/dev/null | head -n 1)
          if [ ! -z "$LATEST" ]; then
            FNAME=$(basename "$LATEST")
            CAPTION="💎 *New PIF Generated*%0A*Model:* ${FNAME%.json}%0A*Database:* Updated"
            curl -s -F document=@"$LATEST" -F chat_id="${CHAT_ID}" -F caption="${CAPTION}" -F parse_mode="Markdown" "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          fi

      - name: Git Push Update
        run: |
          git config --local user.email "iamdrzeus14@gmail.com"
          git config --local user.name "Z E U S"
          
          mkdir -p pif_library
          git add pif_library/ used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync certified pif profiles [skip ci]"
            git push
          else
            echo "No new PIF profiles found."
          fi
