name: PIF Organized Sync (Z E U S B O T)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Run Organized Scraper
        run: python process_pif.py

      - name: Git Push & Sync
        run: |
          # Z E U S B O T Professional Config
          git config --local user.email "iamdrzeus14@gmail.com"
          git config --local user.name "Z E U S B O T"
          
          # Stage the directory and the tracking file
          git add pif_library/ used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            git commit -s -m "chore(pif): organized sync of beta and released properties [skip ci]"
            git push
          else
            echo "Everything is already sorted and up to date."
          fi
