name: Z E U S B O T Global Source Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Sync Sources
        run: python process_pif.py

      - name: Commit to Vault
        run: |
          # Professional Bot Identity
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          
          git add pif_library/ used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            # Signed-off commits for professional log
            git commit -s -m "chore: global aggregator sync [skip ci]"
            git push
          else
            echo "All sources currently in sync."
          fi
