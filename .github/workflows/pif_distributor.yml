name: PIF Beta Sync (Z E U S B O T)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Beta Scraper
        run: python process_pif.py

      - name: Git Push & Database Sync
        run: |
          # Identity Config
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          
          # Force create tracking file if missing
          touch used_fingerprints.txt
          
          # Stage both the new JSONs and the updated database
          git add pif_library/*.json used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            # Signed-off by Z E U S B O T
            git commit -s -m "chore(pif): sync certified beta properties and update db [skip ci]"
            git push
          else
            echo "Database is already up to date. No new fingerprints found."
          fi
