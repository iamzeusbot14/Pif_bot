name: PIF Monthly Beta Sync (Z E U S B O T)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Run Monthly Scraper
        run: python process_pif.py

      - name: Git Push & Sync
        run: |
          # Professional Identity
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          
          mkdir -p pif_library
          touch used_fingerprints.txt
          
          git add pif_library/*.json used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            # Commit with -s for mandatory sign-off
            git commit -s -m "chore(pif): sync certified beta properties for $(date +'%B %Y') [skip ci]"
            git push
          else
            echo "No new beta fingerprints found for this month."
          fi
