name: PIF Python Sync (No Deprecations)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Run Python Scraper
        run: python process_pif.py

      - name: Dispatch Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LATEST=$(ls -t pif_library/*.json 2>/dev/null | head -n 1)
          if [ ! -z "$LATEST" ]; then
            FNAME=$(basename "$LATEST")
            curl -s -F document=@"$LATEST" -F chat_id="${CHAT_ID}" \
                 -F caption="🐍 *PIF Generated via Python*%0A*Model:* ${FNAME%.json}" \
                 -F parse_mode="Markdown" "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          fi

      - name: Git Push
        run: |
          git config --local user.email "iamdrzeus14@gmail.com"
          git config --local user.name "Z E U S"
          
          mkdir -p pif_library
          git add pif_library/ used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: python-powered pif sync [skip ci]"
            git push
          else
            echo "No changes detected."
          fi
          
