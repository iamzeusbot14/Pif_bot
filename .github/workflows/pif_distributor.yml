name: Z E U S B O T Multi-Source Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Run Multi-Source Scraper
        run: python process_pif.py

      - name: Commit Changes
        run: |
          git config --local user.email ""zeusbot@atomicmail.io
          git config --local user.name "Z E U S B O T"
          
          git add pif_library/ used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            git commit -s -m "chore: aggregated sync from multiple sources [skip ci]"
            git push
          else
            echo "No new unique properties found."
          fi
