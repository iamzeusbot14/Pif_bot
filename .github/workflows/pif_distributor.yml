name: Z E U S B O T Ultimate Sync

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours - we must be faster than Google's ban-wave
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python process_pif.py
      - name: Push to Vault
        run: |
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          git add pif_library/ used_fingerprints.txt
          git diff --staged --quiet || (git commit -s -m "chore: ultimate integrity audit $(date +'%Y-%m-%d')" && git push)
