name: PIF Bruteforce Sync (Z E U S B O T)

on:
  schedule:
    - cron: '0 */4 * * *' # Check every 4 hours for new drops
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Run Bruteforce Scraper
        run: python process_pif.py

      - name: Git Push & DB Sync
        run: |
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          
          git add pif_library/*.json used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            git commit -s -m "chore(pif): deep-sync all certified properties [skip ci]"
            git push
          else
            echo "No new properties found in history."
          fi
