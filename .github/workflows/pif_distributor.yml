name: PIF Predator Sync (Z E U S B O T)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Dual-Pass Scraper
        run: python process_pif.py

      - name: Git Push & Sync
        run: |
          git config --local user.email "iamdrzeus14@gmail.com"
          git config --local user.name "Z E U S B O T"
          
          mkdir -p pif_library
          git add pif_library/*.json used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            git commit -s -m "chore(pif): predatory deep sync [skip ci]"
            git push
          else
            echo "All fingerprints (Beta & Release) are already in database."
          fi
