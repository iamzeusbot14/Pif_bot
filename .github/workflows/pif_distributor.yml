name: PIF Professional Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependencies
        run: npm install adm-zip

      - name: Process
        env:
          GH_TOKEN: ${{ github.token }}
        run: node process_pif.js

      - name: Telegram Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LATEST=$(ls -t pif_library/*.json 2>/dev/null | head -n 1)
          if [ ! -z "$LATEST" ]; then
            FNAME=$(basename "$LATEST")
            CAPTION="💎 *Pro PIF Extraction Successful*%0A%0A*Profile:* ${FNAME%.json}%0A*Storage:* /pif_library"
            curl -F document=@"$LATEST" -F chat_id="${CHAT_ID}" -F caption="${CAPTION}" -F parse_mode="Markdown" "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
          fi

      - name: Git Push
        run: |
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          git add pif_library/*.json used_fingerprints.txt
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync pif library [skip ci]"
            git push
          fi
          
