name: Z E U S B O T Global Source Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Check every 3 hours for maximum aggressiveness
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Ultimate Scraper
        run: python process_pif.py

      - name: Push to Vault
        run: |
          # Bot Identity Configuration
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          
          git add pif_library/ used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            # Signed-off-by Z E U S B O T <zeusbot@atomicmail.io>
            git commit -s -m "chore: super-aggregator ultimate sync [skip ci]"
            git push
          else
            echo "No new working PIFs found in this cycle."
          fi
