name: PIF Advanced Beta Sync (Z E U S B O T)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pif-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Deep Multi-Threaded Scraper
        run: python process_pif.py

      - name: Git Push & Database Sync
        run: |
          # Z E U S B O T Professional Identity
          git config --local user.email "zeusbot@atomicmail.io"
          git config --local user.name "Z E U S B O T"
          
          mkdir -p pif_library
          git add pif_library/*.json used_fingerprints.txt
          
          if ! git diff --staged --quiet; then
            # signed-off by Z E U S B O T
            git commit -s -m "chore(pif): deep-sync certified beta/qpr properties [skip ci]"
            git push
          else
            echo "No new unburned properties found."
          fi
